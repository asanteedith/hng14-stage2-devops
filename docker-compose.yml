version: '3.8'

services:
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  worker:
    build: ./worker
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M